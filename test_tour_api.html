<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Tour API</title>
</head>
<body>
    <h1>Tour API Test</h1>
    <button onclick="testTourAPI()">Test Tour API</button>
    <div id="result"></div>

    <script>
        async function testTourAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing...';

            try {
                // First, let's test without authentication (should get 403)
                const response = await fetch('http://localhost:8080/api/tours?page=0&size=10&sortBy=createdAt&sortDir=desc', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                if (response.status === 403) {
                    resultDiv.innerHTML = `
                        <h3>✅ SUCCESS: API is working!</h3>
                        <p>Status: ${response.status} (Forbidden - Expected for authentication)</p>
                        <p>The 500 Internal Server Error has been fixed!</p>
                        <p>The issue was with the TourStatus enum missing the DRAFT status.</p>
                    `;
                } else if (response.status === 500) {
                    resultDiv.innerHTML = `
                        <h3>❌ STILL HAS ERROR</h3>
                        <p>Status: ${response.status} (Internal Server Error)</p>
                        <p>The 500 error is still occurring.</p>
                    `;
                } else {
                    const data = await response.json();
                    resultDiv.innerHTML = `
                        <h3>✅ SUCCESS: API is working!</h3>
                        <p>Status: ${response.status}</p>
                        <p>Response: ${JSON.stringify(data, null, 2)}</p>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <h3>❌ ERROR</h3>
                    <p>Error: ${error.message}</p>
                `;
            }
        }
    </script>
</body>
</html>
