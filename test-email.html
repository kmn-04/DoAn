<!DOCTYPE html>
<html>
<head>
    <title>Test Email</title>
</head>
<body>
    <h1>Test Email Sending</h1>
    
    <button onclick="testEmail()">Test Send Email</button>
    <button onclick="checkConfig()">Check Config</button>
    
    <div id="result" style="margin-top: 20px; padding: 10px; border: 1px solid #ccc;"></div>

    <script>
        async function testEmail() {
            const result = document.getElementById('result');
            result.innerHTML = 'Sending email...';
            
            try {
                const response = await fetch('http://localhost:8080/api/test/simple-email?to=khoi14112004@gmail.com', {
                    method: 'POST'
                });
                
                const data = await response.json();
                result.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
                
                if (data.status === 'success') {
                    result.style.backgroundColor = '#d4edda';
                    result.style.color = '#155724';
                } else {
                    result.style.backgroundColor = '#f8d7da';
                    result.style.color = '#721c24';
                }
            } catch (error) {
                result.innerHTML = `Error: ${error.message}`;
                result.style.backgroundColor = '#f8d7da';
                result.style.color = '#721c24';
            }
        }
        
        async function checkConfig() {
            const result = document.getElementById('result');
            
            try {
                const response = await fetch('http://localhost:8080/api/test/config');
                const data = await response.json();
                result.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
                result.style.backgroundColor = '#d1ecf1';
                result.style.color = '#0c5460';
            } catch (error) {
                result.innerHTML = `Error: ${error.message}`;
                result.style.backgroundColor = '#f8d7da';
                result.style.color = '#721c24';
            }
        }
    </script>
</body>
</html>
