spring.application.name=backend

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/doan
spring.datasource.username=root
spring.datasource.password=1234

# Hibernate DDL Options:
# create: Xóa và tạo lại bảng mỗi lần chạy (mất data)
# create-drop: Tạo bảng khi start, xóa khi stop
# update: Cập nhật schema, giữ nguyên data (KHUYÊN DÙNG)
# validate: Chỉ kiểm tra schema, không thay đổi
# none: Không làm gì
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Auto load data.sql after schema creation
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

